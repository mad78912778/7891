<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mad工作室 - 一键注册</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: #e8f0fe; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; overflow: hidden; }
        .container { background: #fff; width: 100%; max-width: 450px; border-radius: 16px; box-shadow: 0 4px 20px rgba(26, 115, 232, 0.15); overflow: hidden; position: relative; }
        .steps-container { display: flex; height: 100%; transition: transform 0.4s ease-in-out; }
        .step-panel { min-width: 100%; padding: 35px 30px; display: flex; flex-direction: column; gap: 25px; }
        .step-title { font-size: 24px; font-weight: 600; color: #202124; text-align: center; }
        .step-desc { font-size: 14px; color: #5f6368; text-align: center; margin-top: -15px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 14px; color: #3c4043; font-weight: 500; }
        input, select { width: 100%; padding: 12px 16px; border: 1px solid #dadce0; border-radius: 8px; font-size: 16px; outline: none; transition: all 0.2s; background: #f8f9fa; }
        input:focus, select:focus { border-color: #1a73e8; box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.2); background: #fff; }
        .btn { width: 100%; padding: 14px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 500; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
        .btn:hover { background: #1558b0; }
        .btn:disabled { background: #8ab4f8; cursor: not-allowed; }
        .gender-group { display: flex; flex-direction: column; gap: 10px; }
        .gender-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border: 1px solid #dadce0; border-radius: 8px; cursor: pointer; background: #f8f9fa; transition: all 0.2s; }
        .gender-item:hover { background: #f1f3f4; }
        .gender-item.active { border-color: #1a73e8; background: #e8f0fe; }
        .verify-box { width: 100%; height: 120px; border: 2px dashed #1a73e8; border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 10px; background: #f8f9fa; margin-top: 10px; }
        .verify-tip { font-size: 13px; color: #5f6368; }
        .status { font-size: 14px; margin-top: 15px; text-align: center; height: 20px; }
        .success { color: #1e8e3e; }
        .error { color: #d93025; }
        .progress-indicator { display: flex; justify-content: center; gap: 8px; margin-top: 10px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #dadce0; }
        .dot.active { background: #1a73e8; }
        .country-group { max-height: 220px; overflow-y: auto; border: 1px solid #dadce0; border-radius: 8px; background: #f8f9fa; }
        .country-item { padding: 10px 12px; cursor: pointer; border-bottom: 1px solid #eee; }
        .country-item:hover { background: #f1f3f4; }
        .country-item.active { background: #e8f0fe; color: #1a73e8; font-weight: 500; }
        .country-label { font-size: 12px; color: #888; margin-top: 4px; }
    </style>
</head>
<body>
<div class="container">
    <div class="steps-container" id="stepsContainer">
        
        <!-- 步骤1：姓名 -->
        <div class="step-panel" data-step="1">
            <div class="step-title">基本信息</div>
            <div class="step-desc">请输入你的真实姓名</div>
            <div class="form-group">
                <label for="realName">姓名</label>
                <input type="text" id="realName" placeholder="请输入姓名" required>
            </div>
            <button class="btn" id="toStep2">下一步</button>
            <div class="progress-indicator">
                <div class="dot active"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>

        <!-- 步骤2：性别 + 自定义 -->
        <div class="step-panel" data-step="2" style="display: none;">
            <div class="step-title">性别选择</div>
            <div class="step-desc">选择或自定义你的性别</div>
            <div class="gender-group" id="genderGroup">
                <div class="gender-item" data-value="男">
                    <input type="radio" name="gender" value="男"> <span>男</span>
                </div>
                <div class="gender-item" data-value="女">
                    <input type="radio" name="gender" value="女"> <span>女</span>
                </div>
                <div class="gender-item" data-value="自定义">
                    <input type="radio" name="gender" value="自定义"> <span>自定义</span>
                </div>
            </div>
            <input type="text" id="customGender" placeholder="请输入自定义性别" style="display: none;">
            <button class="btn" id="toStep3">下一步</button>
            <div class="progress-indicator">
                <div class="dot"></div>
                <div class="dot active"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>

        <!-- 步骤3：出生日期 -->
        <div class="step-panel" data-step="3" style="display: none;">
            <div class="step-title">出生日期</div>
            <div class="step-desc">请选择你的出生年月日</div>
            <div class="form-group">
                <label for="birthDate">出生日期</label>
                <input type="date" id="birthDate" required>
            </div>
            <button class="btn" id="toStep4">下一步</button>
            <div class="progress-indicator">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot active"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>

        <!-- 步骤4：国家选择（按电话区号分组） -->
        <div class="step-panel" data-step="4" style="display: none;">
            <div class="step-title">选择国家</div>
            <div class="step-desc">按电话区号分组，选择你的国家</div>
            <div class="form-group">
                <label>国家（按电话区号）</label>
                <div class="country-group" id="countryGroup">
                    <!-- 由JS生成 -->
                </div>
            </div>
            <button class="btn" id="toStep5" disabled>下一步</button>
            <div class="progress-indicator">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot active"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>

        <!-- 步骤5：账号密码 -->
        <div class="step-panel" data-step="5" style="display: none;">
            <div class="step-title">账号设置</div>
            <div class="step-desc">设置你的登录账号和密码</div>
            <div class="form-group">
                <label for="userAccount">登录账号</label>
                <input type="text" id="userAccount" placeholder="6-16位字符/数字" minlength="6" maxlength="16" required>
            </div>
            <div class="form-group">
                <label for="userPwd">登录密码</label>
                <input type="password" id="userPwd" placeholder="6-16位字符/数字" minlength="6" maxlength="16" required>
            </div>
            <button class="btn" id="toStep6">下一步</button>
            <div class="progress-indicator">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot active"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>

        <!-- 步骤6：邮箱验证 -->
        <div class="step-panel" data-step="6" style="display: none;">
            <div class="step-title">邮箱验证</div>
            <div class="step-desc">输入有效邮箱，完成注册</div>
            <div class="form-group">
                <label for="userEmail">邮箱地址</label>
                <input type="email" id="userEmail" placeholder="example@domain.com" required>
                <div class="status" id="emailStatus"></div>
            </div>
            <button class="btn" id="toStep7">提交并验证</button>
            <div class="progress-indicator">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot active"></div>
                <div class="dot"></div>
            </div>
        </div>

        <!-- 步骤7：人机验证 -->
        <div class="step-panel" data-step="7" style="display: none;">
            <div class="step-title">安全验证</div>
            <div class="step-desc">完成验证，进入工作室</div>
            <div class="verify-box" id="verifyBox">
                <div class="verify-tip">长按下方按钮 3 秒完成验证</div>
            </div>
            <button class="btn" id="verifyBtn">开始验证</button>
            <div class="status" id="verifyStatus"></div>
            <div class="progress-indicator">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot active"></div>
            </div>
        </div>

    </div>
</div>

<script>
    const userData = {
        name: '', gender: '', birth: '', country: '', account: '', pwd: '', email: ''
    };
    const stepsContainer = document.getElementById('stepsContainer');
    const panels = document.querySelectorAll('.step-panel');
    let currentStep = 1;

    function goToStep(step) {
        currentStep = step;
        stepsContainer.style.transform = `translateX(-${(step - 1) * 100}%)`;
        document.querySelectorAll('.dot').forEach((dot, index) => {
            dot.classList.toggle('active', index === step - 1);
        });
    }

    // 步骤1 → 2
    document.getElementById('toStep2').addEventListener('click', () => {
        const name = document.getElementById('realName').value.trim();
        if (!name) { alert('请输入姓名'); return; }
        userData.name = name;
        goToStep(2);
    });

    // 性别逻辑
    const genderItems = document.querySelectorAll('.gender-item');
    const customGenderInput = document.getElementById('customGender');
    genderItems.forEach(item => {
        item.addEventListener('click', () => {
            genderItems.forEach(i => i.classList.remove('active'));
            item.classList.add('active');
            const val = item.dataset.value;
            customGenderInput.style.display = val === '自定义' ? 'block' : 'none';
            userData.gender = val === '自定义' ? customGenderInput.value.trim() : val;
        });
    });
    customGenderInput.addEventListener('input', () => {
        if (userData.gender === '自定义') userData.gender = customGenderInput.value.trim();
    });

    // 步骤2 → 3
    document.getElementById('toStep3').addEventListener('click', () => {
        if (!userData.gender) { alert('请选择性别'); return; }
        goToStep(3);
    });

    // 步骤3 → 4
    document.getElementById('toStep4').addEventListener('click', () => {
        const birth = document.getElementById('birthDate').value;
        if (!birth) { alert('请选择出生日期'); return; }
        userData.birth = birth;
        goToStep(4);
        initCountrySelect(); // 初始化国家选择
    });

    // 国家选择（按电话区号分组）
    function initCountrySelect() {
        const countryGroup = document.getElementById('countryGroup');
        countryGroup.innerHTML = '';

        // 按区号分组的国家列表
        const countryList = [
            { code: "+1", name: "美国 (United States)", desc: "北美号码计划" },
            { code: "+1", name: "加拿大 (Canada)", desc: "北美号码计划" },
            { code: "+86", name: "中国 (China)", desc: "亚洲" },
            { code: "+852", name: "中国香港 (Hong Kong)", desc: "中国特别行政区" },
            { code: "+853", name: "中国澳门 (Macao)", desc: "中国特别行政区" },
            { code: "+886", name: "中国台湾 (Taiwan)", desc: "中国地区" },
            { code: "+44", name: "英国 (United Kingdom)", desc: "欧洲" },
            { code: "+81", name: "日本 (Japan)", desc: "亚洲" },
            { code: "+82", name: "韩国 (South Korea)", desc: "亚洲" },
            { code: "+61", name: "澳大利亚 (Australia)", desc: "大洋洲" },
            { code: "+33", name: "法国 (France)", desc: "欧洲" },
            { code: "+49", name: "
