<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - Mad工作室</title>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: "Google Sans", Roboto, sans-serif;
}
body{
  background: #fff;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:20px;
}

/* 欢迎动画 */
.welcome{
  position:fixed;
  inset:0;
  background:#fff;
  display:grid;
  place-content:center;
  font-size:24px;
  color:#1a73e8;
  animation:wlc 2s forwards;
  z-index:100;
}
@keyframes wlc{
  0%{opacity:0}
  30%{opacity:1}
  80%{opacity:1}
  100%{opacity:0;visibility:hidden}
}

/* 谷歌风格卡片 */
.card{
  width:100%;
  max-width:420px;
  padding:40px;
  border-radius:10px;
  border:1px solid #dadce0;
}
.logo{
  font-size:22px;
  color:#202124;
  margin-bottom:16px;
  font-weight:500;
}
.subtitle{
  color:#5f6368;
  font-size:14px;
  margin-bottom:30px;
}

/* 表单 */
.form-item{
  margin-bottom:24px;
}
.form-item label{
  display:block;
  font-size:12px;
  color:#5f6368;
  margin-bottom:6px;
}
.form-item input,
.form-item select{
  width:100%;
  height:48px;
  padding:0 14px;
  border:1px solid #dadce0;
  border-radius:6px;
  font-size:14px;
  outline:none;
  background:#fff;
}
.form-item input:focus,
.form-item select:focus{
  border-color:#1a73e8;
  border-width:2px;
}

/* 按钮 */
.btn{
  width:100%;
  height:48px;
  border-radius:6px;
  background:#1a73e8;
  color:#fff;
  border:none;
  font-size:14px;
  font-weight:500;
  cursor:pointer;
  margin-top:10px;
}
.btn:hover{
  background:#1765cc;
}

/* 切换文字 */
.toggle{
  margin-top:20px;
  font-size:14px;
  color:#5f6368;
}
.toggle a{
  color:#1a73e8;
  cursor:pointer;
  text-decoration:none;
}

/* 独立验证弹窗 */
#verifyModal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  display:none;
  place-content:center;
  z-index:99;
}
.verify-box{
  background:#fff;
  padding:40px;
  border-radius:10px;
  text-align:center;
  min-width:300px;
}
.verify-box p{
  color:#5f6368;
  margin-bottom:24px;
  font-size:14px;
}
#holdBtn{
  padding:12px 30px;
  background:#1a73e8;
  color:#fff;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

/* 封号 */
.lock{
  position:fixed;
  inset:0;
  background:#fff;
  color:#d93025;
  display:grid;
  place-content:center;
  font-size:20px;
  font-weight:bold;
  z-index:999;
  padding:20px;
  text-align:center;
}
</style>
</head>

<body>

<!-- 欢迎 -->
<div class="welcome">欢迎来到 Mad 工作室</div>

<!-- 登录 -->
<div id="loginBox">
<div class="card">
  <div class="logo">登录</div>
  <div class="subtitle">请登录以继续</div>
  <div class="form-item">
    <label>账号</label>
    <input type="text" id="loginUser">
  </div>
  <div class="form-item">
    <label>密码</label>
    <input type="password" id="loginPwd">
  </div>
  <button class="btn" onclick="goLoginVerify()">下一步</button>
  <div class="toggle">没有账号？<a onclick="switchToReg()">注册</a></div>
</div>
</div>

<!-- 注册（谷歌风格 + 姓名） -->
<div id="regBox" style="display:none">
<div class="card">
  <div class="logo">创建账号</div>
  <div class="subtitle">填写信息完成注册</div>

  <div class="form-item">
    <label>姓名</label>
    <input id="regName" placeholder="请输入姓名">
  </div>
  <div class="form-item">
    <label>用户名</label>
    <input id="regUser">
  </div>
  <div class="form-item">
    <label>邮箱</label>
    <input id="regEmail">
  </div>
  <div class="form-item">
    <label>出生日期</label>
    <input type="date" id="regBirth">
  </div>
  <div class="form-item">
    <label>性别</label>
    <select id="regGender">
      <option value="">请选择</option>
      <option>男</option>
      <option>女</option>
      <option>跨性别或其他</option>
    </select>
  </div>
  <div class="form-item">
    <label>地区</label>
    <select id="regArea">
      <option value="">请选择地区</option>
      <option value="cn">中国大陆</option>
      <option value="hk">中国香港</option>
      <option value="mo">中国澳门</option>
      <option value="tw">中国台湾</option>
      <option value="other">其他地区</option>
    </select>
  </div>
  <div class="form-item">
    <label>密码</label>
    <input type="password" id="regPwd">
  </div>
  <div class="form-item">
    <label>确认密码</label>
    <input type="password" id="regPwd2">
  </div>

  <button class="btn" onclick="goRegVerify()">注册</button>
  <div class="toggle">已有账号？<a onclick="switchToLogin()">登录</a></div>
</div>
</div>

<!-- 验证弹窗 -->
<div id="verifyModal">
  <div class="verify-box">
    <p>验证您并非自动程式，请长按2秒完成验证<br></p>
    <button id="holdBtn">长按验证</button>
  </div>
</div>

<script>
let pressTime = 0;
let failCount = 0;
let action = "";
let userArea = "cn";

// 封号
function lockAccount(msg){
  document.body.innerHTML = `<div class="lock">${msg}</div>`;
}

// 切换
function switchToReg(){
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("regBox").style.display = "block";
}
function switchToLogin(){
  document.getElementById("regBox").style.display = "none";
  document.getElementById("loginBox").style.display = "block";
}

// 打开验证
function goLoginVerify(){
  action = "login";
  userArea = "cn";
  document.getElementById("verifyModal").style.display = "grid";
}
function goRegVerify(){
  let area = document.getElementById("regArea").value;
  if(!area){ alert("请选择地区"); return; }
  userArea = area;
  action = "reg";
  document.getElementById("verifyModal").style.display = "grid";
}

// 长按验证
const btn = document.getElementById("holdBtn");
btn.onmousedown = btn.ontouchstart = ()=>{
  pressTime = Date.now();
}
btn.onmouseup = btn.ontouchend = ()=>{
  let t = (Date.now()-pressTime)/1000;
  let fail = Math.abs(t-2) < 0.1;

  if(fail){
    alert("验证失败：禁止刚好2秒");
    failCount++;
    if(userArea!=="cn"){
      lockAccount("非大陆地区，一次失败即封号");
    }else{
      if(failCount>=3) lockAccount("失败次数过多，已封号");
      else alert(`已失败 ${failCount} 次`);
    }
    return;
  }

  alert("验证成功，正在跳转");
  location.href = "more.html";
}
</script>
</body>
</html>
