<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Mad 工作室</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: #fff;
            color: #222;
            line-height: 1.6;
        }
        /* 顶部栏 */
        .top-bar {
            background: #2e5ba0;
            color: white;
            padding: 10px 20px;
        }
        .top-bar h1 {
            font-size: 32px;
            font-weight: 500;
        }
        /* 导航栏 */
        .nav {
            display: flex;
            background: #2e5ba0;
            border-top: 1px solid #fff;
        }
        .nav a {
            flex: 1;
            text-align: center;
            padding: 8px 0;
            color: white;
            text-decoration: none;
            font-size: 16px;
        }
        .nav a:hover {
            background: #254a86;
        }
        /* 头部信息区 */
        .header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
        }
        .login-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .login-area .avatar {
            width: 36px;
            height: 36px;
            background: #4285f4;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
        }
        .login-area a {
            color: #222;
            font-size: 22px;
            text-decoration: underline;
        }
        .settings {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #666;
            font-size: 16px;
        }
        .settings .gear {
            font-size: 24px;
        }
        /* 内容区 */
        .content {
            padding: 0 20px 40px;
            max-width: 900px;
        }
        .section {
            margin-bottom: 30px;
        }
        .section h2 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 12px;
            border-bottom: 2px solid #2e5ba0;
            padding-bottom: 4px;
        }
        .section .desc {
            font-size: 15px;
            color: #444;
            margin-bottom: 8px;
        }
        .section .desc .green {
            color: #2e7d32;
            font-size: 13px;
        }
        .section .link {
            font-size: 14px;
            color: #2e5ba0;
            text-decoration: none;
            border-bottom: 1px solid #2e5ba0;
        }
        .section .link:hover {
            color: #1a3d6f;
            border-bottom-color: #1a3d6f;
        }
        .section .coming-soon {
            font-size: 14px;
            color: #666;
        }
        /* 编写组 */
        .team {
            margin-top: 15px;
            font-size: 15px;
            color: #444;
        }
        .team p {
            margin: 4px 0;
            padding-left: 10px;
        }
        /* 按钮 */
        .btn-container {
            text-align: center;
            margin-top: 20px;
        }
        .btn {
            background: #2e5ba0;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 2px;
            font-size: 15px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover {
            background: #254a86;
        }
        /* Email 区域 */
        .email-section {
            margin-top: 40px;
        }
        .email-section h2 {
            font-size: 36px;
            font-weight: 500;
            margin-bottom: 20px;
        }
        .email-list {
            font-size: 15px;
            color: #444;
            margin-left: 30px;
        }
        .email-list p {
            margin: 8px 0;
        }
        .email-list a {
            color: #2e5ba0;
            text-decoration: none;
            border-bottom: 1px solid #2e5ba0;
        }
        .email-list a:hover {
            color: #1a3d6f;
            border-bottom-color: #1a3d6f;
        }
        /* 项目列表 */
        .project-item {
            margin: 25px 0;
        }
        .project-item h3 {
            font-size: 34px;
            font-style: italic;
            font-weight: 500;
            margin-bottom: 15px;
            border-bottom: 2px solid #2e5ba0;
            padding-bottom: 4px;
        }
        .project-item .sub-desc {
            font-size: 15px;
            color: #444;
            margin: 8px 0;
            padding-left: 10px;
        }
    </style>
</head>
<body>

        <h1>Mad</h1>
    </div>
    <div class="nav">
