<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Mad 工作室</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: #fff;
            color: #222;
            line-height: 1.6;
        }
        .top-bar {
            background: #2e5ba0;
            color: white;
            padding: 10px 20px;
        }
        .top-bar h1 {
            font-size: 32px;
            font-weight: 500;
        }
        .nav {
            display: flex;
            background: #2e5ba0;
            border-top: 1px solid #fff;
        }
        .nav a {
            flex: 1;
            text-align: center;
            padding: 8px 0;
            color: white;
            text-decoration: none;
            font-size: 16px;
        }
        .nav a:hover {
            background: #254a86;
        }
        .header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
        }
        .login-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .login-area .avatar {
            width: 36px;
            height: 36px;
            background: #4285f4;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
        }
        .login-area a {
            color: #222;
            font-size: 22px;
            text-decoration: underline;
        }
        .settings {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #666;
            font-size: 16px;
        }
        .settings .gear {
            font-size: 24px;
        }
        .content {
            padding: 0 20px 40px;
            max-width: 900px;
        }
        .section {
            margin-bottom: 30px;
        }
        .section h2 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 12px;
            border-bottom: 2px solid #2e5ba0;
            padding-bottom: 4px;
        }
        .section .desc {
            font-size: 15px;
            color: #444;
            margin-bottom: 8px;
        }
        .section .desc .green {
            color: #2e7d32;
            font-size: 13px;
        }
        .section .link {
            font-size: 14px;
            color: #2e5ba0;
            text-decoration: none;
            border-bottom: 1px solid #2e5ba0;
        }
        .section .link:hover {
            color: #1a3d6f;
            border-bottom-color: #1a3d6f;
        }
        .section .coming-soon {
            font-size: 14px;
            color: #666;
        }
        .team {
            margin-top: 15px;
            font-size: 15px;
            color: #444;
        }
        .team p {
            margin: 4px 0;
            padding-left: 10px;
        }
        .btn-container {
            text-align: center;
            margin-top: 20px;
        }
        .btn {
            background: #2e5ba0;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 2px;
            font-size: 15px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover {
            background: #254a86;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <h1>Mad</h1>
    </div>
    <div class="nav">
        <a href="index.html">工作室</a>
        <a href="news.html">资讯&研究成果</a>
    </div>
    <div class="header-info">
        <div class="login-area">
            <div class="avatar">👤</div>
            <a href="login.html">log in</a>
        </div>
        <div class="settings">
            <span class="gear">⚙️</span>
            <span>设置</span>
        </div>
    </div>
    <div class="content">
        <div class="section">
            <h2>《十七班历史》</h2>
            <p class="desc">
                《十七班历史》是一本基于十一中学2025级十七班逆天历史事件模仿人民教育出版社……
                <span class="green">（此处为绿色小字）</span>
            </p>
            <a href="page2.html" class="link">具体信息→</a>
        </div>
        <div class="section">
            <h2>《新考向：跨学科融合》</h2>
            <p class="coming-soon">更新中敬请期待……</p>
        </div>
        <div class="section">
            <h2>编写工作</h2>
            <div class="team">
                <p>编写组: 主任: mad</p>
                <p>&nbsp;&nbsp;&nbsp;&nbsp;副主任: 王X, 周X, 张骞</p>
            </div>
            <div class="btn-container">
                <a href="more.html" class="btn">查看更多项目 →</a>
            </div>
        </div>
    </div>
</body>
</html>
