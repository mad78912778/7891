<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>议员申请 - MAD工作室</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto}
body{background:#f5f7fa;color:#333;line-height:1.6}
.navbar{background:#fff;box-shadow:0 2px 10px #0001;position:sticky;top:0;z-index:99;padding:1rem 5%;display:flex;justify-content:space-between;align-items:center}
.logo{font-size:1.5rem;font-weight:bold;color:#2c3e50}
.nav-links{display:flex;gap:2rem}
.nav-links a{text-decoration:none;color:#2c3e50;font-weight:500}
.nav-links a:hover{color:#3498db}
.container{max-width:700px;margin:3rem auto;padding:0 5%}
.card{background:#fff;border-radius:12px;box-shadow:0 4px 15px #00005;padding:2.5rem}
.card h2{margin-bottom:1.5rem;color:#2c3e50;border-bottom:2px solid #f1f1f1;padding-bottom:0.5rem}
.form-group{margin-bottom:1.2rem}
.form-group label{display:block;margin-bottom:0.4rem;font-weight:500;color:#2c3e50}
.form-group input{width:100%;padding:0.9rem;border:1px solid #ddd;border-radius:8px;font-size:1rem}
.invite-code{font-family:monospace;color:#e74c3c;font-weight:bold;font-size:1.1rem;word-break:break-all}
.submit-btn{margin-top:1rem;width:100%;padding:1rem;background:#3498db;color:#fff;border:none;border-radius:8px;font-size:1.1rem;font-weight:bold;cursor:pointer}
.submit-btn:hover{background:#2980b9}
.tip{margin-top:1rem;font-size:0.9rem;color:#666}

/* 弹窗样式 */
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;justify-content:center;align-items:center}
.modal-content{background:white;padding:2rem;border-radius:8px;width:90%;max-width:400px;position:relative;text-align:center}
.close-btn{position:absolute;top:1rem;right:1rem;font-size:1.5rem;cursor:pointer;color:#777}
.close-btn:hover{color:#e74c3c}
.modal-btn{margin-top:1rem;padding:0.75rem 1.5rem;background:#3498db;color:white;border:none;border-radius:4px;cursor:pointer}
</style>
</head>

<body>

<nav class="navbar">
  <div class="logo">MAD工作室</div>
  <div class="nav-links">
    <a href="index.html">首页</a>
    <a href="research.html">研究成果</a>
    <a href="problem.html">帮助</a>
  </div>
</nav>

<div class="container">
  <div class="card">
    <h2>班级MAD工作室 · 议员申请</h2>

    <div class="form-group">
      <label>证明您是：阜新市第XX中学十七班学生</label>
      <input type="text" id="studentInfo" placeholder="请输入你的姓名 / 学号">
    </div>

    <div class="form-group">
      <label>您的职位（大于组长，小于班长）</label>
      <input type="text" id="position" placeholder="例如：课代表、纪律委员、副班长等">
    </div>

    <div class="form-group">
      <label>您的邀请码</label>
      <input type="text" id="inviteCodeInput" placeholder="请输入邀请码">
      <div class="tip">
        邀请码需由官方提供，输入错误将无法通过验证
      </div>
    </div>

    <button class="submit-btn" onclick="validateInviteCode()">提交议员申请</button>
  </div>
</div>

<!-- 成功弹窗 -->
<div class="modal" id="successModal">
  <div class="modal-content">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <h2>✅ 申请成功！</h2>
    <p>您已成功成为MAD工作室议员，《yellow十七》计划权限已开通。</p>
    <button class="modal-btn" onclick="closeModal()">确定</button>
  </div>
</div>

<script>
// 验证邀请码
function validateInviteCode() {
  const inviteCode = document.getElementById('inviteCodeInput').value.trim();
  const correctCode = "27787891114514ʌɑːɔ:ɜːɜːɒʊɒɒあいうぃ☆3";
  
  if (inviteCode === correctCode) {
    document.getElementById('successModal').style.display = 'flex';
  } else {
    alert('邀请码错误，请检查后重试！');
  }
}

// 关闭弹窗
function closeModal() {
  document.getElementById('successModal').style.display = 'none';
}

// 点击弹窗外部关闭
window.onclick = function(event) {
  const modal = document.getElementById('successModal');
  if (event.target === modal) {
    closeModal();
  }
}
</script>

</body>
</html>
