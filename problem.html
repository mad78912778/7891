<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>问题</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        .problem-section {
            margin: 2rem 1rem;
        }
        .problem-section h2 {
            font-size: 2rem;
            color: #333;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #2b579a;
            margin-bottom: 2rem;
        }
        .arrow-btn {
            width: 60px;
            height: 60px;
            border: 3px solid #2b579a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #2b579a;
            margin: 0 auto 2rem;
        }
        .links {
            margin: 1rem 0;
            padding-left: 1rem;
            line-height: 2;
        }
        .links a {
            color: #9c27b0;
            text-decoration: underline;
        }
        .links a:hover {
            color: #673ab7;
        }
        /* 返回按钮 */
        .back {
            text-align: center;
            margin-top: 3rem;
        }
        .back a {
            color: #2b579a;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="problem-section">
        <h2>问题:</h2>
        <div class="arrow-btn">➡️</div>
        <div class="links">
            <p>没有电子邮件? 获取 <a href="https://aka.ms/AAb9ysg" target="_blank">Outlook for Android</a></p>
            <p>进入官方网站: <a href="https://www.google.com" target="_blank">Google for Android</a></p>
        </div>
    </div>

    <div class="back">
        <a href="page2.html">← 返回项目页</a>
    </div>
</body>
</html>
