<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mad 工作室</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        /* 顶部导航栏 */
        .top-bar {
            background-color: #2b579a;
            color: white;
            padding: 2rem 1rem 0.5rem;
        }
        .top-bar h1 {
            font-size: 2.5rem;
            font-style: italic;
            font-weight: normal;
        }
        .nav-row {
            display: flex;
            justify-content: space-around;
            margin-top: 1rem;
            padding: 0.8rem 0;
            border-top: 1px solid white;
            font-size: 1.2rem;
        }
        /* 登录与设置区 */
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
        }
        .user-icon {
            width: 40px;
            height: 40px;
            border: 2px solid #2b579a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #2b579a;
        }
        .settings {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.5rem;
            color: #333;
        }
        .settings .gear {
            font-size: 2rem;
        }
        .login {
            font-size: 1.8rem;
            color: #333;
            text-decoration: underline;
            padding: 0 1rem;
        }
        /* 内容区块 */
        .section {
            margin: 2rem 1rem;
        }
        .section h2 {
            font-size: 2rem;
            font-family: "KaiTi", "STKaiti", serif;
            color: #333;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #2b579a;
            margin-bottom: 1rem;
        }
        .section p {
            color: #555;
            line-height: 1.6;
            margin: 0.5rem 0;
        }
        .section .link {
            color: #2b579a;
            text-decoration: none;
            font-weight: bold;
        }
        .section .link:hover {
            text-decoration: underline;
        }
        .team {
            margin-top: 1rem;
            padding-left: 1rem;
            color: #555;
            line-height: 1.8;
        }
        /* 跳转到第二页按钮 */
        .next-page {
            text-align: center;
            margin: 2rem 0;
        }
        .next-page a {
            display: inline-block;
            background-color: #2b579a;
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 4px;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <div class="top-bar">
        <h1>Mad</h1>
        <div class="nav-row">
            <span>工作室</span>
            <span>资讯&研究成果</span>
        </div>
    </div>

    <!-- 登录与设置 -->
    <div class="header-section">
        <div class="user-icon">👤</div>
        <div class="settings">
            <span class="gear">⚙️</span>
            <span>设置</span>
        </div>
    </div>
    <div class="login">log in</div>

    <!-- 内容区 -->
    <div class="section">
        <h2>《十七班历史》</h2>
        <p>《十七班历史》是一本基于十一中学2025级十七班逆天历史事件模仿人民教育出版社……<span style="color:#4caf50">（此处为绿色小字）</span></p>
        <a href="#" class="link">具体信息→</a>
    </div>

    <div class="section">
        <h2>《新考向：跨学科融合》</h2>
        <p>更新中敬请期待……</p>
    </div>

    <div class="section">
        <h2>编写工作</h2>
        <div class="team">
            <p>编写组: 主任: mad</p>
            <p style="padding-left: 2rem;">副主任: 王X, 周X, 张骞</p>
        </div>
    </div>

    <!-- 跳转到第二页 -->
    <div class="next-page">
        <a href="page2.html">查看更多项目 →</a>
    </div>
</body>
</html>
