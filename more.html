<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>十七班MAD工作室</title>
<style>
*{box-sizing:border-box;font-family:system-ui,sans-serif;margin:0;padding:0}
body{background:#f7f8fa;color:#202124}
header{background:#4285f4;color:#fff;padding:14px 20px;display:flex;justify-content:space-between;align-items:center}
.logo{font-weight:500}
.nav a{color:#e8f0fe;margin-left:16px;text-decoration:none;font-size:14px}
.search{max-width:800px;margin:20px auto;padding:0 20px}
.search input{width:100%;height:44px;border-radius:22px;border:1px solid #dadce0;padding:0 16px}
.container{max-width:800px;margin:0 auto;padding:0 20px}
.card{background:#fff;border-radius:10px;padding:20px;margin-bottom:14px;border:1px solid #dadce0}
.card h3{margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #eee}
.ai{max-width:800px;margin:30px auto;padding:0 20px}
.chat{height:320px;background:#fff;border-radius:12px;padding:12px;overflow-y:auto;border:1px solid #dadce0;margin-bottom:12px}
.msg{padding:10px 14px;border-radius:16px;margin:8px 0;max-width:75%}
.user{background:#4285f4;color:#fff;margin-left:auto}
.bot{background:#f1f3f4}
.input{display:flex;gap:10px}
input{flex:1;height:44px;border-radius:22px;border:1px solid #dadce0;padding:0 16px}
button{padding:0 20px;background:#4285f4;color:#fff;border:none;border-radius:22px}
#status{color:#666;margin-bottom:10px}
footer{text-align:center;padding:30px;color:#888;font-size:13px}
</style>
</head>
<body>

<header>
  <div class="logo">十七班MAD工作室</div>
  <div class="nav">
    <a>首页</a><a>项目</a><a>文档</a><a>AI</a>
  </div>
</header>

<div class="search">
  <input placeholder="搜索..." id="search">
</div>

<div class="container">
  <div class="card"><h3>十七班历史</h3></div>
  <div class="card"><h3>跨学科融合项目</h3></div>
  <div class="card"><h3>double tong's story</h3></div>
  <div class="card"><h3>十七班野史</h3><p>敬请期待</p></div>
</div>

<div class="ai">
  <div id="status">加载中：Gemma 2B 开源模型（从 Hugging Face 加载，无需上传模型）</div>
  <div class="chat" id="chat"></div>
  <div class="input">
    <input id="msg" placeholder="输入问题...">
    <button onclick="send()">发送</button>
  </div>
</div>

<footer>© 2026 十七班MAD工作室</footer>

<!-- 核心：直接加载 WebLLM 跑开源 Gemma -->
<script src="https://cdn.jsdelivr.net/npm/@mlc-ai/web-llm@0.2.70/dist/web-llm.min.js"></script>
<script>
const chat = document.getElementById('chat');
const msg = document.getElementById('msg');
const status = document.getElementById('status');
let engine;

(async () => {
  engine = await webllm.CreateMLCEngine("gemma-2b-it-q4f32");
  status.textContent = "✅ Gemma 开源模型加载完成，可以对话";
  msg.disabled = false;
})();

async function send(){
  const text = msg.value.trim();
  if(!text || !engine) return;
  add(text, true);
  msg.value = '';
  add("思考中...", false);
  
  const r = await engine.chatCompletion([
    { role: "user", content: text }
  ]);
  
  chat.removeChild(chat.lastChild);
  add(r.choices[0].message.content, false);
}

function add(t, isUser){
  const d = document.createElement('div');
  d.className = isUser ? 'msg user' : 'msg bot';
  d.textContent = t;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

document.getElementById('search').oninput = e => {
  document.querySelectorAll('.card').forEach(c => {
    c.style.display = c.textContent.toLowerCase().includes(e.target.value.toLowerCase())?'block':'none';
  });
};
</script>
</body>
</html>
