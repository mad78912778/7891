<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>十七班MAD工作室 - 首页</title>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: "Google Sans", Roboto, sans-serif;
}
body{
  background: #f7f8fa;
  color:#202124;
}

/* 导航栏（改成浅蓝） */
header{
  background:#4285f4;
  color:#fff;
  padding:12px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.logo{
  font-size:15px;
  font-weight:500;
}
.nav-links a{
  color:#e8eaed;
  text-decoration:none;
  font-size:13px;
  margin-left:16px;
}
.nav-links a.active{
  color:#fff;
  font-weight:500;
}

/* 搜索栏 */
.search-bar{
  max-width:800px;
  margin:20px auto;
  padding:0 20px;
}
.search-bar input{
  width:100%;
  height:44px;
  padding:0 16px;
  border:1px solid #dadce0;
  border-radius:22px;
  font-size:14px;
  outline:none;
  background:#fff;
}
.search-bar input:focus{
  border-color:#4285f4;
  border-width:2px;
}

/* 内容容器 */
.container{
  max-width:800px;
  margin:0 auto;
  padding:0 20px 40px;
}
.page-title{
  margin:20px 0;
  font-size:20px;
  font-weight:500;
}
.page-subtitle{
  color:#5f6368;
  font-size:13px;
  margin-bottom:24px;
}

/* 项目卡片 */
.card{
  background:#fff;
  border-radius:8px;
  border:1px solid #dadce0;
  padding:20px;
  margin-bottom:16px;
  transition: all 0.2s;
}
.card.highlight{
  border-color:#4285f4;
  box-shadow: 0 0 0 2px rgba(66, 133, 244, 0.2);
}
.card h3{
  color:#202124;
  font-size:18px;
  margin-bottom:12px;
  padding-bottom:8px;
  border-bottom:1px solid #dadce0;
}
.card p{
  color:#5f6368;
  font-size:13px;
  line-height:1.6;
  margin-bottom:10px;
}
.card a{
  color:#4285f4;
  font-size:13px;
  text-decoration:none;
}
.card a:hover{
  text-decoration:underline;
}

/* 页脚 */
footer{
  text-align:center;
  padding:30px;
  color:#5f6368;
  font-size:12px;
}
</style>
</head>
<body>

<!-- 导航栏 -->
<header>
  <div class="logo">十七班MAD工作室</div>
  <div class="nav-links">
    <a href="#" class="active">首页</a>
    <a href="#">研究成果</a>
    <a href="#">problem</a>
    <a href="#">关于我们</a>
  </div>
</header>

<!-- 搜索栏（带高亮功能） -->
<div class="search-bar">
  <input type="text" id="searchInput" placeholder="搜索工作室项目、邮件或内容...">
</div>

<!-- 内容主体 -->
<div class="container">
  <div class="page-title">首页</div>
  <div class="page-subtitle">欢迎来到十七班MAD工作室官方网站</div>

  <!-- Email 卡片 -->
  <div class="card">
    <h3>十七班历史</h3>
    <p></p>
    <p></p>
    <p> 暂无</p>
    <p></p>
  </div>

  <!-- 《gal 十七》项目 -->
  <div class="card">
    <h3>《gal 十七》项目</h3>
    <p>获取 .apk 形式安装包→ <a href="#">点击获取</a></p>
    <p>项目报告→ <a href="#">查看报告</a></p>
  </div>

  <!-- 《yellow 十七》计划 -->
  <div class="card">
    <h3>《yellow 十七》计划</h3>
    <p>与一中合作制作，包括除王 X 之外所有十七班同学的关于 █ █ █ █ █ 的文章……</p>
    <p>获取 .Pdf 文件→ <a href="#">点击下载</a></p>
  </div>

  <!-- 《十七班野史暨野史：十七班列传》 -->
  <div class="card">
    <h3>《十七班野史暨野史：十七班列传》</h3>
    <p style="color:#999;">敬请期待……</p>
  </div>
</div>

<!-- 页脚 -->
<footer>
  &copy; 2026 十七班MAD工作室 · 版权所有
</footer>

<script>
// 搜索高亮功能
const searchInput = document.getElementById('searchInput');
const cards = document.querySelectorAll('.card');

searchInput.addEventListener('input', function() {
  const keyword = this.value.toLowerCase().trim();
  if (keyword === '') {
    // 无关键词，恢复所有卡片状态
    cards.forEach(card => {
      card.classList.remove('highlight');
      card.style.display = 'block';
    });
    return;
  }

  cards.forEach(card => {
    const text = card.textContent.toLowerCase();
    if (text.includes(keyword)) {
      card.classList.add('highlight');
      card.style.display = 'block';
    } else {
      card.classList.remove('highlight');
      card.style.display = 'none';
    }
  });
});
</script>

</body>
</html>
