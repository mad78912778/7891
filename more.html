<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>十七班MAD工作室</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family: "Google Sans", Roboto, sans-serif;}
body{background:#f7f8fa;color:#202124;}
header{background:#4285f4;color:#fff;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;}
.logo{font-size:16px;font-weight:500;}
.nav a{color:#e8f0fe;margin-left:18px;text-decoration:none;font-size:14px;}
.nav a.active{color:#fff;font-weight:bold;}
.search-section{max-width:800px;margin:24px auto;padding:0 20px;}
.search-section input{width:100%;height:44px;border-radius:22px;border:1px solid #dadce0;padding:0 18px;font-size:14px;outline:none;}
.search-section input:focus{border-color:#4285f4;border-width:2px;}
.container{max-width:800px;margin:0 auto;padding:0 20px;}
.card{background:#fff;border-radius:10px;padding:22px;margin-bottom:16px;border:1px solid #dadce0;}
.card h3{margin-bottom:12px;font-size:17px;padding-bottom:8px;border-bottom:1px solid #eee;}
.card p{color:#5f6368;font-size:14px;line-height:1.6;}
.ai-section{max-width:800px;margin:40px auto 0;padding:20px;background:#fff;border-radius:12px;border:1px solid #dadce0;}
.ai-title{font-size:16px;margin-bottom:16px;}
.chat-box{height:320px;overflow-y:auto;margin-bottom:16px;}
.msg{padding:10px 14px;border-radius:16px;margin-bottom:10px;max-width:75%;font-size:14px;}
.user{background:#4285f4;color:#fff;margin-left:auto;}
.ai{background:#f1f3f4;margin-right:auto;}
.ai-input-row{display:flex;gap:10px;}
.ai-input{flex:1;height:44px;border-radius:22px;border:1px solid #dadce0;padding:0 16px;outline:none;}
.ai-send{padding:0 22px;height:44px;border-radius:22px;background:#4285f4;color:#fff;border:none;cursor:pointer;}
footer{text-align:center;padding:30px;color:#888;font-size:13px;}
</style>
</head>
<body>

<header>
  <div class="logo">十七班MAD工作室</div>
  <div class="nav">
    <a class="active">首页</a>
    <a>项目</a>
    <a>文档</a>
    <a>AI</a>
  </div>
</header>

<div class="search-section">
  <input id="searchInput" placeholder="搜索内容...">
</div>

<div class="container">
  <div class="card">
    <h3>十七班历史</h3>
    <p></p>
    <p></p>
    <p></p>
  </div>
  <div class="card">
    <h3>《新考向-跨学科融合》项目</h3>
    <p>获取安装包 → 点击获取</p>
    <p>项目报告 → 查看报告</p>
  </div>
  <div class="card">
    <h3>double tong's story</h3>
    <p></p>
    <p>获取 PDF → 点击下载</p>
  </div>
  <div class="card">
    <h3>《十七班野史》</h3>
    <p>敬请期待……</p>
  </div>
</div>

<div class="ai-section">
  <div class="ai-title">madAI助手（AITools）</div>
  <div class="chat-box" id="chatBox"></div>
  <div class="ai-input-row">
    <input class="ai-input" id="aiInput" placeholder="输入问题...">
    <button class="ai-send" id="sendBtn">发送</button>
  </div>
</div>

<footer>© 2026 十七班MAD工作室</footer>

<script>
// 搜索功能
const searchInput = document.getElementById('searchInput');
const cards = document.querySelectorAll('.card');
searchInput.addEventListener('input', function(){
  const key = this.value.toLowerCase();
  cards.forEach(card=>{
    card.style.display = card.textContent.toLowerCase().includes(key) ? 'block' : 'none';
  });
});

// AI 配置
const API_KEY = "sk-5f9eae01025345a884e962bb9392ebf4";
const API_URL = "https://api.aitools.cfd/v1/chat/completions";

const aiInput = document.getElementById('aiInput');
const sendBtn = document.getElementById('sendBtn');
const chatBox = document.getElementById('chatBox');

function addMsg(text, isUser){
  const div = document.createElement('div');
  div.className = isUser ? 'msg user' : 'msg ai';
  div.textContent = text;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

async function sendAI(){
  const text = aiInput.value.trim();
  if(!text) return;

  addMsg(text, true);
  aiInput.value = '';
  addMsg("AI正在思考...", false);

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + API_KEY,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: "deepseek-r1",
        messages: [{ role: "user", content: text }]
      })
    });

    // 移除加载提示
    chatBox.removeChild(chatBox.lastChild);

    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content || "AI 繁忙，请稍后再试";
    addMsg(reply, false);
  } catch (e) {
    // 移除加载提示
    chatBox.removeChild(chatBox.lastChild);
    addMsg("连接失败，请检查网络或API Key", false);
  }
}

sendBtn.onclick = sendAI;
aiInput.addEventListener('keypress', e => {
  if(e.key === 'Enter') sendAI();
});
</script>
</body>
</html>
