<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>注册 - Mad 工作室</title>
<style>
  *{ margin:0; padding:0; box-sizing:border-box; font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  body{ background:#ffffff; color:#202124; }

  .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px 16px;
  }

  /* 步骤条 */
  .steps {
      display: flex;
      justify-content: space-between;
      margin-bottom: 28px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e0e0e0;
  }
  .step {
      font-size: 15px;
      color: #5f6368;
      position: relative;
      font-weight: 500;
  }
  .step.active { color: #1a73e8; }
  .step.active::after {
      content: '';
      position: absolute;
      bottom: -13px; left: 0; width: 100%; height: 3px; background: #1a73e8;
  }

  /* 面板切换 */
  .panel { display: none; }
  .panel.active { display: block; }

  /* 标题/描述 */
  .title {
      font-size: 24px;
      font-weight: 700;
      margin-top: 12px;
      margin-bottom: 8px;
  }
  .desc {
      font-size: 16px;
      color: #5f6368;
      margin-bottom: 28px;
  }
</style>
</head>
<body>
<div class="container">

    <!-- 步骤条 -->
  <div class="steps">
    <div class="step active">选择账号</div>
    <div class="step">输入邮箱</div>
    <div class="step">人机验证</div>
  </div>

  <!-- 面板1：选择账号 -->
  <div class="panel active" id="panel1">
    <div class="title">创建您的账号</div>
    <div class="desc">请选择注册方式</div>

    <div class="auth-list" style="display: flex;flex-direction: column;gap: 16px;margin-top: 20px;">
      <!-- 谷歌账号：跳转官网 -->
      <div class="auth-item" id="googleBtn" style="display: flex;align-items: center;padding: 16px 18px;border: 1px solid #dadce0;border-radius: 12px;cursor: pointer;">
        <div class="auth-icon" style="width: 28px;height: 28px;margin-right: 18px;display: flex;align-items: center;justify-content: center;color: #4285f4;font-size: 22px;font-weight: bold;">G</div>
        <div>
          <div class="auth-text" style="font-size: 18px;font-weight: 500;color: #202124;">Google 账号</div>
          <div class="auth-sub" style="font-size: 14px;color: #5f6368;margin-top: 4px;">使用 Gmail 邮箱注册</div>
        </div>
      </div>

      <!-- 微软账号：本地流程 -->
      <div class="auth-item" data-target="panel2" style="display: flex;align-items: center;padding: 16px 18px;border: 1px solid #dadce0;border-radius: 12px;cursor: pointer;">
        <div class="auth-icon" style="width: 28px;height: 28px;margin-right: 18px;display: flex;align-items: center;justify-content: center;color: #00a4ef;font-size: 22px;font-weight: bold;">MS</div>
        <div>
          <div class="auth-text" style="font-size: 18px;font-weight: 500;color: #202124;">Microsoft 账号</div>
          <div class="auth-sub" style="font-size: 14px;color: #5f6368;margin-top: 4px;">使用 Outlook 邮箱注册</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 面板2：输入邮箱 -->
  <div class="panel" id="panel2">
    <div class="title">输入您的邮箱</div>
    <div class="desc">我们将向您的邮箱发送验证链接</div>

    <input type="email" id="emailInput" placeholder="请输入您的邮箱" style="width: 100%;padding: 16px 18px;border: 1px solid #dadce0;border-radius: 12px;font-size: 17px;margin-top: 12px;">

    <div class="btn-group" style="display: flex;justify-content: space-between;margin-top: 28px;">
      <button class="btn btn-back" id="goBack1" style="background: transparent;color: #1a73e8;border: none;font-size: 16px;padding: 12px 20px;">返回</button>
      <button class="btn btn-primary" id="goToCaptcha" style="background: #1a73e8;color: white;border: none;border-radius: 10px;font-size: 16px;padding: 12px 20px;">下一步</button>
    </div>
  </div>

    <!-- 面板3：长按人机验证 -->
  <div class="panel" id="panel3">
    <div class="title">完成安全验证</div>
    <div class="desc">请长按下方按钮完成认证</div>

    <div class="captcha-area" style="margin: 20px 0;text-align: center;">
      <button class="captcha-btn" id="captchaBtn" style="width: 100%;padding: 14px;background: #1a73e8;color: white;border: none;border-radius: 12px;font-size: 17px;font-weight: 600;cursor: pointer;">长按验证</button>
      <div class="captcha-tip" style="margin-top: 12px;font-size: 14px;color: #5f6368;">长按约2秒完成验证</div>
    </div>

    <div class="btn-group" style="display: flex;justify-content: space-between;margin-top: 28px;">
      <button class="btn btn-back" id="goBack2" style="background: transparent;color: #1a73e8;border: none;font-size: 16px;padding: 12px 20px;">返回</button>
      <button class="btn btn-primary" id="submitRegister" disabled style="background: #1a73e8;color: white;border: none;border-radius: 10px;font-size: 16px;padding: 12px 20px;">完成注册</button>
    </div>
  </div>
</div>

<script>
  const panels = document.querySelectorAll('.panel');
  const stepItems = document.querySelectorAll('.step');
  const googleBtn = document.getElementById('googleBtn');
  const microsoftBtn = document.querySelector('.auth-item[data-target]');
  const emailInput = document.getElementById('emailInput');
  const goToCaptcha = document.getElementById('goToCaptcha');
  const goBack1 = document.getElementById('goBack1');
  const goBack2 = document.getElementById('goBack2');
  const captchaBtn = document.getElementById('captchaBtn');
  const submitRegister = document.getElementById('submitRegister');

  let currentStep = 0;
  let isVerified = false;
  let holdTimer = null;

  // 1. 谷歌账号：跳转官网
  googleBtn.addEventListener('click', () => {
    window.open('https://accounts.google.com/signup', '_blank');
    alert('已打开谷歌官方注册页面，注册成功后请返回登录。');
    window.location.href = 'index.html';
  });

  // 2. 微软账号：切换到输入邮箱页
  microsoftBtn.addEventListener('click', () => {
    goToPanel(1);
  });

  // 3. 返回按钮
  goBack1.addEventListener('click', () => goToPanel(0));
  goBack2.addEventListener('click', () => goToPanel(1));

  // 4. 下一步：进入验证页
  goToCaptcha.addEventListener('click', () => {
    const email = emailInput.value.trim();
    if (!email) {
      alert('请输入邮箱');
      return;
    }
    goToPanel(2);
  });

  // 5. 长按人机验证
  captchaBtn.addEventListener('mousedown', startHold);
  captchaBtn.addEventListener('touchstart', startHold, { passive: true });
  document.addEventListener('mouseup', endHold);
  document.addEventListener('touchend', endHold);

  function startHold() {
    clearTimeout(holdTimer);
    captchaBtn.classList.add('holding');
    
    holdTimer = setTimeout(() => {
      isVerified = true;
      captchaBtn.innerText = '验证成功';
      submitRegister.disabled = false;
    }, 800); // 长按800ms
  }

  function endHold() {
    if (!isVerified) {
      captchaBtn.classList.remove('holding');
    }
  }

  // 6. 完成注册
  submitRegister.addEventListener('click', () => {
    if (!isVerified) {
      alert('请完成长按验证');
      return;
    }
    alert('注册成功！即将返回首页');
    window.location.href = 'index.html';
  });

  // 切换面板
  function goToPanel(step) {
    currentStep = step;
    panels.forEach((p, i) => p.classList.toggle('active', i === step));
    stepItems.forEach((s, i) => s.classList.toggle('active', i === step));
  }
</script>
</body>
</html>
