<!DOCTYPE html>
 <html lang="zh-CN">
 <head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>注册 - Mad 工作室</title>
 <style>
   *{ margin:0; padding:0; box-sizing:border-box; font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
   body{ background:#f8f9fa; color:#202124; }
   .container {
       max-width: 500px;
       margin: 40px auto;
       padding: 0 20px;
   }
   /* 步骤条 */
   .steps {
       display: flex;
       justify-content: space-between;
       margin-bottom: 25px;
       padding-bottom: 10px;
       border-bottom: 1px solid #e0e0e0;
   }
   .step {
       font-size: 14px;
       color: #5f6368;
       position: relative;
   }
   .step.active { color: #1a73e8; font-weight: 600; }
   .step.active::after {
       content: '';
       position: absolute;
       bottom: -11px; left: 0; width: 100%; height: 2px; background: #1a73e8;
   }
   /* 面板 */
   .panel { display: none; }
   .panel.active { display: block; }
   /* 标题 */
   .title { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
   .desc { font-size: 14px; color: #5f6368; margin-bottom: 20px; }
   /* 账号选择按钮 */
   .auth-options {
       display: flex;
       flex-direction: column;
       gap: 12px;
       margin-bottom: 20px;
   }
   .auth-option {
       display: flex;
       align-items: center;
       padding: 12px 16px;
       border: 1px solid #dadce0;
       border-radius: 8px;
       cursor: pointer;
       transition: border-color .2s;
   }
   .auth-option:hover { border-color: #1a73e8; }
   .auth-option img {
       width: 24px; height: 24px;
       margin-right: 16px;
   }
   .auth-option .text {
       font-size: 16px; font-weight: 500;
       color: #202124;
   }
   .auth-option .sub {
       font-size: 12px; color: #5f6368;
   }
   /* 输入框 */
   input {
       width: 100%;
       padding: 12px 16px;
       border: 1px solid #dadce0;
       border-radius: 8px;
       font-size: 16px;
       margin-bottom: 16px;
   }
   input:focus {
       outline: none;
       border-color: #1a73e8;
       box-shadow: 0 0 0 2px rgba(26,115,232,0.2);
   }
   /* 滑块验证 */
   .captcha-box {
       position: relative;
       height: 50px;
       margin: 20px 0;
   }
   .captcha-bg {
       position: absolute; top: 0; left: 0; right: 0; bottom: 0;
       background: linear-gradient(90deg, #e0e0e0, #f5f5f5);
       border-radius: 8px; overflow: hidden;
   }
   .captcha-block {
       position: absolute; left: 0; top: 0;
       width: 60px; height: 50px;
       background: #fff; border: 1px solid #d1d1d1;
       border-radius: 8px; cursor: grab;
       display: flex; align-items: center; justify-content: center;
       font-size: 20px; color: #1a73e8;
       z-index: 2;
     }
   .captcha-block:active { cursor: grabbing; }
   .captcha-text {
       position: absolute; left: 0; right: 0; top: 0; bottom: 0;
       display: flex; align-items: center; justify-content: center;
       color: #5f6368; font-weight: 500;
   }
   /* 按钮 */
   .btn {
       padding: 10px 18px;
       border-radius: 8px;
       font-weight: 500;
       cursor: pointer;
   }
   .btn-primary {
       background: #1a73e8;
       color: white;
       border: none;
   }
   .btn-primary:hover { background: #1765d1; }
   .btn-back {
       background: transparent;
       color: #1a73e8;
       border: none;
   }
   .btn-back:hover { text-decoration: underline; }
   .btn-group {
       display: flex;
       justify-content: space-between;
       margin-top: 20px;
   }
 </style>
 </head>
 <body>
 <div class="container">
   <!-- 步骤条 -->
   <div class="steps">
     <div class="step active" id="step1">选择账号</div>
     <div class="step" id="step2">输入邮箱</div>
     <div class="step" id="step3">人机验证</div>
   </div>
   <!-- 面板 1：选择谷歌/微软账号 -->
   <div class="panel active" id="panel1">
     <div class="title">创建您的账号</div>
     <div class="desc">请选择注册方式</div>
     <div class="auth-options">
       <!-- 选择谷歌账号 → 跳转到面板2 -->
       <div class="auth-option" data-target="panel2">
         <img src="https://ssl.gstatic.com/accounts/branding/googlelogo/1x/googlelogo_color_24x24dp.png" alt="Google">
         <div>
           <div class="text">Google 账号</div>
           <div class="sub">使用 Gmail 邮箱注册</div>
         </div>
       </div>
       <!-- 选择微软账号 → 跳转到面板2 -->
       <div class="auth-option" data-target="panel2">
         <img src="https://www.microsoft.com/favicon.ico" alt="Microsoft">
         <div>
           <div class="text">Microsoft 账号</div>
           <div class="sub">使用 Outlook 邮箱注册</div>
         </div>
       </div>
     </div>
   </div>
   <!-- 面板 2：输入邮箱 -->
   <div class="panel" id="panel2">
     <div class="title">输入您的邮箱</div>
     <div class="desc">我们将向您的邮箱发送验证链接</div>
     <input type="email" id="emailInput" placeholder="请输入您的邮箱">
     <div class="btn-group">
       <button class="btn btn-back" id="goBack1">返回</button>
       <button class="btn btn-primary" id="goToCaptcha">下一步</button>
     </div>
   </div>
   <!-- 面板 3：滑块人机验证 -->
   <div class="panel" id="panel3">
     <div class="title">完成安全验证</div>
     <div class="desc">请拖动滑块完成验证</div>
     <div class="captcha-box">
       <div class="captcha-bg">
         <div class="captcha-text">完成验证 →</div>
       </div>
       <div class="captcha-block" id="captchaBlock">→</div>
     </div>
     <div class="btn-group">
       <button class="btn btn-back" id="goBack2">返回</button>
       <button class="btn btn-primary" id="submitRegister">完成注册</button>
     </div>
   </div>
 </div>
 <script>
   const steps = [document.getElementById('step1'), document.getElementById('step2'), document.getElementById('step3')];
   const panels = [document.getElementById('panel1'), document.getElementById('panel2'), document.getElementById('panel3')];
   const captchaBlock = document.getElementById('captchaBlock');
   const goToCaptcha = document.getElementById('goToCaptcha');
   const submitRegister = document.getElementById('submitRegister');
   const goBack1 = document.getElementById('goBack1');
   const goBack2 = document.getElementById('goBack2');
   const authOptions = document.querySelectorAll('.auth-option');
   let currentStep = 0;
   let captchaVerified = false;
   // 1. 点击“谷歌/微软账号”进入输入邮箱页
   authOptions.forEach(option => {
     option.addEventListener('click', () => {
       goToPanel(1); // 跳转到输入邮箱页
     });
   });
   // 2. 点击下一步 → 跳转到人机验证页
   goToCaptcha.addEventListener('click', () => {
     const email = document.getElementById('emailInput').value.trim();
     if (!email) {
       alert('请输入邮箱');
       return;
     }
     goToPanel(2); // 跳转到人机验证页
   });
   // 3. 返回按钮逻辑
   goBack1.addEventListener('click', () => goToPanel(0));
   goBack2.addEventListener('click', () => goToPanel(1));
   // 4. 滑块人机验证
   const bgWidth = captchaBlock.parentElement.offsetWidth - captchaBlock.offsetWidth;
   
   captchaBlock.addEventListener('mousedown', startDrag);
   captchaBlock.addEventListener('touchstart', startDrag, { passive: true });
   function startDrag(e) {
     document.addEventListener('mousemove', drag);
     document.addEventListener('touchmove', drag, { passive: true });
     document.addEventListener('mouseup', endDrag);
     document.addEventListener('touchend', endDrag);
   }
   function drag(e) {
     let x = (e.clientX || e.touches[0].clientX) - captchaBlock.parentElement.getBoundingClientRect().left;
     x = Math.max(0, Math.min(x, bgWidth));
     captchaBlock.style.transform = `translateX(${x}px)`;
   }
   function endDrag() {
     document.removeEventListener('mousemove', drag);
     document.removeEventListener('touchmove', drag);
     const finalX = parseFloat(captchaBlock.style.transform.replace('translateX(', '')) || 0;
     
     if (Math.abs(finalX - bgWidth) < 5) {
       captchaBlock.style.transform = `translateX(${bgWidth}px)`;
       captchaVerified = true;
     } else {
       captchaBlock.style.transform = 'translateX(0)';
       captchaVerified = false;
     }
   }
   // 5. 完成注册
   submitRegister.addEventListener('click', () => {
     if (!captchaVerified) {
       alert('请完成滑块验证');
       return;
     }
     alert('注册成功！即将返回首页');
     window.location.href = 'index.html'; // 注册成功后跳回首页
   });
   // 切换面板工具函数
   function goToPanel(step) {
     currentStep = step;
     steps.forEach((s, i) => s.classList.toggle('active', i === step));
     panels.forEach((p, i) => p.classList.toggle('active', i === step));
   }
 </script>
 </body>
 </html>
