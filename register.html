<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAD Workroom · 休宜公告</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body {
            background-color: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .post-card {
            width: 100%;
            max-width: 600px;
            background-color: #111;
            border-radius: 12px;
            padding: 24px;
        }
        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: bold;
        }
        .user-info .name {
            font-weight: bold;
            font-size: 16px;
        }
        .user-info .handle {
            color: #aaa;
            font-size: 14px;
        }
        .post-content {
            font-size: 17px;
            line-height: 1.7;
            margin-bottom: 20px;
        }
        .post-footer {
            display: flex;
            gap: 24px;
            color: #aaa;
            font-size: 14px;
        }
        .btn-wrap {
            margin-top: 30px;
            text-align: center;
        }
        .btn {
            padding: 10px 24px;
            background-color: #1a73e8;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="post-card">
        <div class="post-header">
            <div class="avatar">M</div>
            <div class="user-info">
                <div class="name">MAD Workroom</div>
                <div class="handle">@madworkroom</div>
            </div>
        </div>

        <div class="post-content">
各位大陆人、抽象乐子人、沃尔玛购物袋、武装直升机、土豆生命体、星际浮游生物、阴间居民、
正常人、LGBTQ、摆烂怪、网络游魂、熬夜选手、野生牛马、精神状态良好的、精神状态崩坏的，
还有动物平权派、回归原始派、地球至上派：<br><br>

本站登录注册、邮箱验证临时炸服关停！<br>
系统正在抽象重构，谁都别想注册登录，<br>
蹲好等解封，一律暂时禁止入驻！
        </div>

        <div class="post-footer">
          <span>转发到</span>
            <span>Microsoft teams</span>
            <span>微信</span>
            <span>YouTube</span>
            <span>Facebook</span>
        </div>

        <div class="btn-wrap">
            <button class="btn" onclick="history.back()">返回</button>
        </div>
    </div>
</body>
</html>
