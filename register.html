<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>邮箱注册</title>
    <style>
        .form-box { max-width: 400px; margin: 50px auto; padding: 20px; border: 1px solid #eee; border-radius: 8px; }
        .form-item { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #2ea44f; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        .tip { color: #666; font-size: 12px; margin-top: 5px; }
        .error { color: #f44336; }
    </style>
</head>
<body>
    <div class="form-box">
        <h2>邮箱注册</h2>
        <div class="form-item">
            <label>电子邮箱</label>
            <input type="email" id="regEmail" placeholder="请输入您的邮箱" required>
            <div class="tip" id="emailTip"></div>
        </div>
        <div class="form-item">
            <label>密码</label>
            <input type="password" id="regPwd" placeholder="请设置8位以上密码" required>
        </div>
        <div class="form-item">
            <label>确认密码</label>
            <input type="password" id="regPwd2" placeholder="请再次输入密码" required>
        </div>
        <button onclick="register()">注册</button>
        <div class="tip" style="margin-top:15px;">已有账号？<a href="login.html">去登录</a></div>
    </div>

    <script>
        function register() {
            const email = document.getElementById('regEmail').value;
            const pwd = document.getElementById('regPwd').value;
            const pwd2 = document.getElementById('regPwd2').value;
            const tip = document.getElementById('emailTip');

            if (!email.includes('@')) {
                tip.className = 'tip error';
                tip.textContent = '请输入有效的邮箱地址';
                return;
            }
            if (pwd.length < 8) {
                tip.className = 'tip error';
                tip.textContent = '密码长度不能少于8位';
                return;
            }
            if (pwd !== pwd2) {
                tip.className = 'tip error';
                tip.textContent = '两次输入的密码不一致';
                return;
            }

            const users = JSON.parse(localStorage.getItem('users') || '{}');
            if (users[email]) {
                tip.className = 'tip error';
                tip.textContent = '该邮箱已被注册，请直接登录或使用其他邮箱';
                return;
            }

            users[email] = { password: pwd, createTime: new Date().toISOString() };
            localStorage.setItem('users', JSON.stringify(users));

            alert('注册成功！请前往登录页登录');
            location.href = 'login.html';
        }
    </script>
</body>
</html>
