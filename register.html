
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAD App 注册</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        body {
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 480px;
            padding: 32px;
        }
        .step { display: none; }
        .step.active { display: block; }
        h2 {
            font-size: 24px;
            color: #1a1a1a;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 24px;
            font-size: 16px;
        }
        .input-item { margin-bottom: 16px; }
        .input-full, .select-full {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
        }
        .btn-wrap {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-color: #1a73e8;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
        }
        .btn.gray {
            background-color: #e0e0e0;
            color: #333;
        }
        .agreement {
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 16px;
            height: 300px;
            overflow-y: auto;
            font-size: 14px;
            line-height: 1.6;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="step active" id="step1">
            <h2>创建账户</h2>
            <div class="subtitle">请输入邮箱</div>
            <div class="input-item">
                <input type="email" id="email" class="input-full" placeholder="xxx@qq.com">
            </div>
            <div class="btn-wrap">
                <button class="btn" onclick="checkEmailNext()">下一步</button>
            </div>
        </div>

        <div class="step" id="step2">
            <h2>设置密码</h2>
            <div class="subtitle">至少8位，含大小写+数字</div>
            <div class="input-item">
                <input type="password" id="pwd" class="input-full" placeholder="设置密码">
            </div>
            <div class="btn-wrap">
                <button class="btn gray" onclick="prevStep(2)">上一步</button>
                <button class="btn" onclick="nextStep(2)">下一步</button>
            </div>
        </div>

        <div class="step" id="step3">
            <h2>邮箱验证</h2>
            <div class="subtitle">演示版直接点下一步即可</div>
            <div class="input-item">
                <input type="text" class="input-full" placeholder="验证码（演示可随意填）">
            </div>
            <div class="btn-wrap">
                <button class="btn gray" onclick="prevStep(3)">上一步</button>
                <button class="btn" onclick="nextStep(3)">下一步</button>
            </div>
        </div>

        <div class="step" id="step4">
            <h2>选择性别</h2>
            <div class="subtitle">常规 & 抽象趣味性别</div>
            <div class="input-item">
                <select id="gender" class="select-full">
                    <option value="">请选择性别</option>
                    <option value="男">男</option>
                    <option value="女">女</option>
                    <option value="不愿透露">不愿透露</option>
                    <option value="我不是人类">我不是人类</option>
                    <option value="沃尔玛购物袋">沃尔玛购物袋</option>
                    <option value="武装直升机">武装直升机</option>
                    <option value="土豆生命体">土豆生命体</option>
                    <option value="星际浮游生物">星际浮游生物</option>
                    <option value="路边野生牛马">路边野生牛马</option>
                    <option value="抽象大气层">抽象大气层</option>
                    <option value="阴间普通居民">阴间普通居民</option>
                    <option value="AI人工智障">AI人工智障</option>
                    <option value="地表野生摆烂怪">地表野生摆烂怪</option>
                    <option value="顶级乐子人">顶级乐子人</option>
                    <option value="精神状态良好">精神状态良好</option>
                    <option value="纯种网络游魂">纯种网络游魂</option>
                    <option value="熬夜常驻选手">熬夜常驻选手</option>
                    <option value="摆烂一级运动员">摆烂一级运动员</option>
                    <option value="互联网难民">互联网难民</option>
                    <option value="野生抽象大师">野生抽象大师</option>
                    <option value="人间凑数嘉宾">人间凑数嘉宾</option>
                    <option value="随缘存活选手">随缘存活选手</option>
                </select>
            </div>
            <div class="btn-wrap">
                <button class="btn gray" onclick="prevStep(4)">上一步</button>
                <button class="btn" onclick="nextStep(4)">下一步</button>
            </div>
        </div>

        <div class="step" id="step5">
            <h2>出生日期</h2>
            <div class="subtitle">建议选18岁以上</div>
            <div class="input-item">
                <input type="date" class="input-full">
            </div>
            <div class="btn-wrap">
                <button class="btn gray" onclick="prevStep(5)">上一步</button>
                <button class="btn" onclick="nextStep(5)">下一步</button>
            </div>
        </div>

        <div class="step" id="step6">
            <h2>个人偏好</h2>
            <div class="subtitle">请选择性取向</div>
            <div class="input-item">
                <select class="select-full">
                    <option value="">请选择</option>
                    <option value="正常">正常</option>
                    <option value="gay">gay</option>
                    <option value="lesbian">lesbian</option>
                    <option value="跨性别者（女）">跨性别者（女）</option>
                    <option value="跨性别者（男）">跨性别者（男）</option>
                    <option value="双性恋">双性恋</option>
                </select>
            </div>
            <div class="btn-wrap">
                <button class="btn gray" onclick="prevStep(6)">上一步</button>
                <button class="btn" onclick="nextStep(6)">下一步</button>
            </div>
        </div>

        <div class="step" id="step7">
            <h2>用户许可协议</h2>
            <div class="subtitle">请阅读并同意条款</div>
            <div class="agreement">
<strong>MAD Workroom 最终用户许可协议</strong><br><br>
欢迎使用本站服务，注册即代表同意以上全部规则，遵守网络规范，文明使用平台所有功能。
            </div>
            <div class="btn-wrap">
                <button class="btn gray" onclick="prevStep(7)">返回修改</button>
                <button class="btn" onclick="alert('注册成功！')">同意协议并注册</button>
            </div>
        </div>
    </div>

    <script>
        let currentStep = 1;
        const maxStep = 7;
        function showStep(s){
            document.querySelectorAll('.step').forEach(el=>el.classList.remove('active'));
            document.getElementById('step'+s).classList.add('active');
            currentStep = s;
        }
        function nextStep(f){if(f===currentStep&&f<maxStep)showStep(f+1);}
        function prevStep(f){if(f===currentStep&&f>1)showStep(f-1);}

        function checkEmailFormat(e){
            return /^[a-zA-Z0-9_-]+@[a-zA-Z0-9_-]+(\.[a-zA-Z0-9_-]+)+$/.test(e);
        }
        function checkEmailNext(){
            let e = document.getElementById('email').value.trim();
            if(!e)return alert('请输入邮箱');
            if(!checkEmailFormat(e))return alert('邮箱格式错误');
            nextStep(1);
        }
    </script>
</body>
</html>
