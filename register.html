<!-- ========== 弹窗：谷歌/微软账号注册流程 ========== -->
<div class="modal" id="modal">
  <div class="modal-box">
    <span class="close" id="closeModal">&times;</span>

    <!-- 步骤条 -->
    <div class="steps">
      <div class="step active" id="step1">选择账号</div>
      <div class="step" id="step2">填写信息</div>
      <div class="step" id="step3">完成验证</div>
    </div>

    <!-- 面板 1：选择谷歌/微软账号 -->
    <div class="panel active" id="panel1">
      <h2 class="modal-title">创建您的账号</h2>
      <p class="modal-desc">请选择注册方式</p>

      <div class="auth-options">
        <!-- 谷歌账号 -->
        <div class="auth-option" data-target="panel2">
          <img src="https://ssl.gstatic.com/accounts/branding/googlelogo/1x/googlelogo_color_24x24dp.png" alt="Google">
          <div>
            <div class="text">使用 Google 账号</div>
            <div class="sub">注册 Gmail、Drive 等服务</div>
          </div>
        </div>

        <!-- 微软账号 -->
        <div class="auth-option" data-target="panel2">
          <img src="https://www.microsoft.com/favicon.ico" alt="Microsoft">
          <div>
            <div class="text">使用 Microsoft 账号</div>
            <div class="sub">注册 Outlook、Xbox 等服务</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 面板 2：填写邮箱/手机号 -->
    <div class="panel" id="panel2">
      <h2 class="modal-title">欢迎使用</h2>
      <p class="modal-desc">请输入您的邮箱或手机号</p>

      <input type="text" id="regEmail" placeholder="邮箱或手机号">

      <div class="btn-group">
        <button class="btn btn-back" id="goBack1">返回</button>
        <button class="btn btn-primary" id="goToCaptcha">下一步</button>
      </div>
    </div>

    <!-- 面板 3：滑块人机验证 -->
    <div class="panel" id="panel3">
      <h2 class="modal-title">完成安全验证</h2>
      <p class="modal-desc">请拖动滑块完成验证</p>

      <div class="captcha-box">
        <div class="captcha-bg">
          <div class="captcha-text">完成验证 →</div>
        </div>
        <div class="captcha-block" id="captchaBlock">→</div>
      </div>

      <div class="btn-group">
        <button class="btn btn-back" id="goBack2">返回</button>
        <button class="btn btn-primary" id="submitRegister">完成注册</button>
      </div>
    </div>
  </div>
</div>

<script>
  const modal = document.getElementById("modal");
  const loginTrigger = document.getElementById("loginTrigger"); // Log in 按钮
  const closeModal = document.getElementById("closeModal");
  const steps = [document.getElementById('step1'), document.getElementById('step2'), document.getElementById('step3')];
  const panels = [document.getElementById('panel1'), document.getElementById('panel2'), document.getElementById('panel3')];
  const captchaBlock = document.getElementById('captchaBlock');
  const goToCaptcha = document.getElementById('goToCaptcha');
  const submitRegister = document.getElementById('submitRegister');
  const goBack1 = document.getElementById('goBack1');
  const goBack2 = document.getElementById('goBack2');

  let currentStep = 0;
