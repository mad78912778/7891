<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>邮箱登录</title>
    <style>
        .form-box { max-width: 400px; margin: 50px auto; padding: 20px; border: 1px solid #eee; border-radius: 8px; }
        .form-item { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #2ea44f; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        .tip { color: #666; font-size: 12px; margin-top: 5px; }
        .error { color: #f44336; }
    </style>
</head>
<body>
    <div class="form-box">
        <h2>邮箱登录</h2>
        <div class="form-item">
            <label>电子邮箱</label>
            <input type="email" id="loginEmail" placeholder="请输入注册时的邮箱" required>
        </div>
        <div class="form-item">
            <label>密码</label>
            <input type="password" id="loginPwd" placeholder="请输入密码" required>
            <div class="tip" id="loginTip"></div>
        </div>
        <button onclick="login()">登录</button>
        <div class="tip" style="margin-top:15px;">没有账号？<a href="register.html">去注册</a></div>
    </div>

    <script>
        function login() {
            const email = document.getElementById('loginEmail').value;
            const pwd = document.getElementById('loginPwd').value;
            const tip = document.getElementById('loginTip');

            const users = JSON.parse(localStorage.getItem('users') || '{}');
            const user = users[email];

            if (!user) {
                tip.className = 'tip error';
                tip.textContent = '该邮箱未注册，请先注册';
                return;
            }
            if (user.password !== pwd) {
                tip.className = 'tip error';
                tip.textContent = '密码错误，请重试';
                return;
            }

            localStorage.setItem('currentUser', email);
            alert('登录成功！');
            location.href = 'page2.html';
        }
    </script>
</body>
</html>
