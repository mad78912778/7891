<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - MAD App</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,Roboto,sans-serif}
body{
    background:#fff;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:20px;
}
.login-box{
    width:100%;
    max-width:360px;
}
h2{
    text-align:center;
    font-size:32px;
    color:#202124;
    margin-bottom:40px;
}
.input-item{
    margin-bottom:20px;
}
.input-item input{
    width:100%;
    padding:16px;
    border:1px solid #dadce0;
    border-radius:0;
    font-size:16px;
    outline:none;
}
.btn-login{
    width:100%;
    padding:12px;
    background:#1a73e8;
    color:#fff;
    border:none;
    font-size:16px;
    cursor:pointer;
    border-radius:0;
    margin-bottom:30px;
}
.reg-tip{
    text-align:center;
    color:#5f6368;
    margin-bottom:15px;
}
.reg-btn{
    width:100%;
    padding:12px;
    border:1px solid #1a73e8;
    color:#1a73e8;
    background:#fff;
    font-size:16px;
    cursor:pointer;
    border-radius:0;
    margin-bottom:12px;
}
</style>
</head>
<body>
<div class="login-box">
    <h2>登录账号</h2>

    <div class="input-item">
        <input type="email" placeholder="请输入邮箱">
    </div>
    <div class="input-item">
        <input type="password" placeholder="请输入密码">
    </div>

    <button class="btn-login">登录</button>

    <div class="reg-tip">还没有账号？请注册</div>

    <button class="reg-btn" onclick="location.href='register.html'">我个人注册</button>
    <button class="reg-btn" onclick="location.href='register.html'">为加入工作室注册</button>
</div>
</body>
</html>
